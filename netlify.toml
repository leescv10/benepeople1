[build]
  command = "npx vite build"
  publish = "dist"

[build.environment]
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"
  SECRETS_SCAN_SMART_DETECTION_OMIT_VALUES = "AIzaSyDZ3xMyIxmhxOP2uLVhPaex2IbfMFQxV7w"

[functions]
  directory = "netlify/functions"

# Netlify API redirects to serverless functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Support SPA Client-side routing fallback
# This ensures that deep linking and page refreshes work flawlessly in React
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
